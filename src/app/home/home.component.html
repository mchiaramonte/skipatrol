@if (loading) {
  <div class="loading-message">Loading resort data...</div>
} @else if (error) {
  <div class="error-message">Unable to load resort data. Retrying...</div>
} @else {
  <div class="home-container">
    <div class="resort-grid">
      @for (resort of resorts; track resort.name) {
        <div class="resort-card-wrapper">
          <app-resort-view [data]="resort"></app-resort-view>
        </div>
      }
    </div>
    <div class="last-updated">
      Last Updated: {{lastUpdated.toLocaleString()}}
    </div>
  </div>
}
